<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ออฟไลน์ — LekToDo</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        background: radial-gradient(at 0% 0%, #c7d2fe 0%, transparent 50%),
          radial-gradient(at 100% 100%, #f5d0fe 0%, transparent 50%), #f7f7fb;
        color: #0f172a;
        padding: 24px;
      }
      .card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 24px;
        padding: 32px;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(99, 102, 241, 0.15);
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        border-radius: 18px;
        background: linear-gradient(135deg, #6366f1, #ec4899);
        display: grid;
        place-items: center;
        color: white;
        font-size: 28px;
      }
      h1 { margin: 0 0 6px; font-size: 22px; }
      p { color: #64748b; margin: 0 0 20px; }
      button {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        border: 0;
        border-radius: 12px;
        padding: 12px 20px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0b1020; color: #e2e8f0; }
        .card { background: rgba(15, 23, 42, 0.6); border-color: rgba(255, 255, 255, 0.08); }
        p { color: #94a3b8; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">✓</div>
      <h1>คุณอยู่ในโหมดออฟไลน์</h1>
      <p>กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ตแล้วลองใหม่อีกครั้ง</p>
      <button onclick="location.reload()">ลองอีกครั้ง</button>
    </div>
  </body>
</html>
